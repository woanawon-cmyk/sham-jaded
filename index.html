<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقديم الطلب</title>
    <style>
        body {
            background-color: #0a192f;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: white;
            box-sizing: border-box;
        }

        .container {
            width: 320px;
            max-width: 100%;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            background-color: #00d4d4;
            margin: 0 auto 20px;
            border-radius: 15px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        h2 {
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background-color: #1a2f4d;
            color: white;
            box-sizing: border-box;
            font-size: 15px;
        }

        input::placeholder {
            color: #a9b8d0;
        }

        input:focus {
            outline: 2px solid #00d4d4;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border-radius: 8px;
            border: none;
            background-color: #3b82f6;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
        }

        .message.success {
            background-color: rgba(34, 197, 94, 0.16);
            color: #86efac;
        }

        .message.error {
            background-color: rgba(239, 68, 68, 0.16);
            color: #fca5a5;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"></div>
        <h2>تقديم الطلب</h2>

        <form id="requestForm">
            <input type="email" id="email" required placeholder="البريد الإلكتروني">
            <input type="text" id="name" required placeholder="الاسم">
            <input type="text" id="orderNumber" maxlength="6" pattern="\d{6}" required placeholder="رقم الطلب">
            <button type="submit" id="submitButton">تقديم الطلب</button>
        </form>

        <div id="message" class="message hidden"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
