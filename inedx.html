<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقديم طلب</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="requestForm" class="form-container">
            <h2>تقديم طلب جديد</h2>
            <form id="submitForm">
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" required placeholder="example@email.com">
                </div>
                
                <div class="form-group">
                    <label for="name">الاسم</label>
                    <input type="text" id="name" required placeholder="أدخل اسمك">
                </div>
                
                <button type="submit" class="btn-submit">تسجيل</button>
            </form>
        </div>

        <div id="orderNumberForm" class="form-container hidden">
            <h2>إدخال رقم الطلب</h2>
            <form id="orderForm">
                <div class="form-group">
                    <label for="orderNumber">رقم الطلب (6 أرقام)</label>
                    <input type="text" id="orderNumber" maxlength="6" pattern="\d{6}" required placeholder="123456">
                </div>
                
                <button type="submit" class="btn-submit">إرسال الطلب</button>
            </form>
            <div id="message" class="message hidden"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
